<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finex Pos | Kasir Tablet Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }

        /* AREA PRINT NOTA */
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 58mm; padding: 2mm; background: white; font-family: 'Courier New', monospace; font-size: 10px; line-height: 1.2; color: black; }
            @page { margin: 0; }
        }

        /* NAVIGATION */
        nav { width: 240px; background: var(--primary); color: white; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        nav h2 { color: var(--accent); margin-bottom: 30px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        nav a { color: #bdc3c7; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: block; font-size: 14px; }
        nav a:hover, nav a.active { background: var(--accent); color: white; }
        .logout-btn { margin-top: auto; background: #c0392b; color: white; text-align: center; font-weight: bold; padding: 12px; border-radius: 8px; cursor: pointer; }

        /* MAIN CONTENT - FULL SCREEN KATALOG */
        main { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; }
        .search-bar { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 25px; font-size: 18px; outline: none; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; padding: 30px 15px; border-radius: 25px; text-align: center; cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.05); transition: 0.2s; border: 2px solid transparent; position: relative; display: flex; flex-direction: column; justify-content: center; min-height: 160px; }
        .card:active { transform: scale(0.95); background: #f0f9ff; border-color: var(--accent); }
        .stok-badge { position: absolute; top: 12px; right: 12px; background: #f1f5f9; font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold; }

        /* FLOATING CART BUTTON */
        .floating-cart {
            position: fixed; bottom: 35px; right: 35px; width: 85px; height: 85px;
            background: var(--accent); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 32px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(52, 152, 219, 0.4);
            z-index: 999; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .floating-cart:active { transform: scale(0.9); }
        .cart-badge {
            position: absolute; top: 0; right: 0; background: var(--danger);
            color: white; font-size: 14px; font-weight: bold; width: 28px; height: 28px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid white;
        }

        /* POP-UP DETAIL KERANJANG */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f1f1f1; }
        .summary-box { background: #f8f9fa; padding: 20px; border-radius: 20px; margin-top: 20px; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #666; }
        .total-line { font-size: 22px; font-weight: 900; color: var(--primary); border-top: 2px dashed #ddd; margin-top: 10px; padding-top: 10px; }

        .btn-action { width: 100%; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-close { background: #eee; color: #777; margin-top: 5px; }
    </style>
</head>
<body>

    <nav>
        <h2 id="store-name-display">Finex Pos</h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="pos.html" class="active">🛒 Masuk Kasir</a>
        <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
        <a href="laporan-bill.html">📄 Riwayat</a>
        <a href="closing.html">🏁 Closing Shift</a>
        <div class="logout-btn" onclick="logout()">🚪 Keluar Sistem</div>
    </nav>
        
    <main>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h1 style="margin:0; font-weight: 900; color: var(--primary);">Katalog Produk</h1>
            <div id="clock" style="font-weight:bold; color:var(--accent); font-family: monospace;"></div>
        </div>
        <input type="text" id="search" class="search-bar" placeholder="Cari menu..." onkeyup="loadMenu()">
        <div id="displayMenu" class="grid-menu"></div>
    </main>

    <div class="floating-cart" onclick="toggleCartModal()">
        <i class="fas fa-shopping-basket"></i>
        <span id="cart-badge-count" class="cart-badge">0</span>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0; font-weight: 900; display: flex; justify-content: space-between;">
                <span>Pesanan Baru</span>
                <span onclick="toggleCartModal()" style="cursor:pointer; color:#ccc;">&times;</span>
            </h2>
            
            <div id="modalCartList" style="margin-bottom: 10px;">
                </div>

            <div class="summary-box">
                <div class="summary-line"><span>Subtotal Gross</span><span id="m-txt-sub">Rp 0</span></div>
                <div class="summary-line">
                    <span>Diskon Bill</span>
                    <select id="m-discGlobal" onchange="calculateTotal()" style="padding:4px; border-radius:5px; border:1px solid #ddd;"></select>
                </div>
                <div class="summary-line total-line"><span>TOTAL</span><span id="m-txt-total" style="color:var(--accent);">Rp 0</span></div>
            </div>

            <button class="btn-action" style="background:var(--success); color:white;" onclick="openPayment()">PROSES BAYAR</button>
            <button class="btn-action btn-close" onclick="toggleCartModal()">KEMBALI KE KATALOG</button>
        </div>
    </div>

    <div id="payModal" class="modal">
        <div class="modal-content">
            <h2 id="label-total-modal" style="color: var(--primary); text-align: center; margin-top: 0; font-weight: 900;"></h2>
            <div id="splitContainer"></div>
            <button style="background:var(--accent); color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; margin-bottom:15px;" onclick="addSplitRow()">+ Tambah Metode</button>
            <div style="background: #f1f1f1; padding: 15px; border-radius: 15px; margin-bottom: 15px;">
                <div class="summary-line"><span>Input:</span><span id="txt-inputed" style="font-weight:bold;">Rp 0</span></div>
                <div class="summary-line" id="row-change" style="display:none; color:var(--success);"><span>Kembali:</span><span id="txt-change" style="font-weight:bold;">Rp 0</span></div>
                <div class="summary-line" id="row-rem" style="color:var(--danger);"><span>Sisa Tagihan:</span><span id="txt-remaining" style="font-weight:bold;">Rp 0</span></div>
            </div>
            <button class="btn-action" style="background:var(--primary); color:white;" id="btnConfirm" onclick="executeTransaction()">KONFIRMASI & CETAK</button>
            <button onclick="closePayment()" class="btn-action btn-close">BATAL</button>
        </div>
    </div>

    <div id="waModal" class="modal"><div class="modal-content" style="text-align: center;"><h2 style="color: var(--success);">Berhasil!</h2><input type="number" id="waNumber" placeholder="628xxx" style="font-size: 18px; text-align: center; width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px;"><button class="btn-action" id="btnSendWA" style="background:#25D366; color:white;">KIRIM WHATSAPP</button><button onclick="location.reload()" class="btn-action btn-close">SELESAI</button></div></div>
    <div id="openShiftModal" class="modal"><div class="modal-content" style="text-align: center;"><h2>Buka Kasir Baru</h2><input type="number" id="inputSaldoAwal" placeholder="Saldo Awal Rp" style="font-size: 24px; font-weight: bold; text-align: center; width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; margin: 20px 0;"><button class="btn-action" style="background:var(--primary); color:white;" onclick="executeOpenShift()">BUKA KASIR</button></div></div>

    <div id="print-area"></div>

<script>
    let cart = []; let taxRate = 0; let paymentMethods = []; let availableDiscounts = [];
    let state = { sub: 0, discItem: 0, discGlobal: 0, tax: 0, total: 0, lastTrxId: null, lastInv: "", payments: [] };
    let currentLogId = null; let isSaving = false;
    const session = JSON.parse(localStorage.getItem('finex_session'));

    window.onload = async () => {
        if (!session) return window.location.replace('login.html');
        await checkActiveShift(); await loadSettings(); await loadMenu();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        document.getElementById('btnSendWA').onclick = sendWhatsApp;
    };

    function toggleCartModal() {
        const m = document.getElementById('cartModal');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        calculateTotal();
    }

    async function checkActiveShift() {
        const { data } = await db.from('kasir_log').select('id').eq('kasir_nama', session.username).eq('status', 'Open').maybeSingle();
        if (data) currentLogId = data.id; else document.getElementById('openShiftModal').style.display = 'flex';
    }

    async function executeOpenShift() {
        const saldoAwal = parseFloat(document.getElementById('inputSaldoAwal').value || 0);
        const { data, error } = await db.from('kasir_log').insert([{ kasir_nama: session.username, saldo_awal: saldoAwal, status: 'Open', waktu_buka: new Date().toISOString() }]).select().single();
        if (!error) { currentLogId = data.id; document.getElementById('openShiftModal').style.display = 'none'; }
    }

    async function loadSettings() {
        const { data: pData } = await db.from('ppn').select('nilai').eq('id', 1).single();
        if (pData) taxRate = parseFloat(pData.nilai) / 100;
        const { data: mtd } = await db.from('metode_pembayaran').select('*'); paymentMethods = mtd || [];
        const { data: dsk } = await db.from('diskon').select('*'); availableDiscounts = dsk || [];
        const opts = '<option value="0">Diskon 0%</option>' + availableDiscounts.map(d => `<option value="${d.persen}">${d.nama_diskon} (${d.persen}%)</option>`).join('');
        document.getElementById('m-discGlobal').innerHTML = opts;
    }

    async function loadMenu() {
        const q = document.getElementById('search').value;
        let query = db.from('produk').select('*').gt('stok_sekarang', 0);
        if (q) query = query.ilike('nama_barang', `%${q}%`); else query = query.limit(4);
        const { data } = await query.order('nama_barang');
        document.getElementById('displayMenu').innerHTML = (data || []).map(p => `
            <div class="card" onclick="addCart('${p.id}', '${p.nama_barang}', ${p.harga_jual}, ${p.stok_sekarang})">
                <span class="stok-badge">Stok: ${p.stok_sekarang}</span>
                <div style="font-weight:900; font-size:18px; color:var(--primary);">${p.nama_barang}</div>
                <div style="color:var(--success); font-weight:bold; margin-top:10px; font-size:20px;">Rp ${p.harga_jual.toLocaleString()}</div>
            </div>`).join('');
    }

    function addCart(id, nama, harga, stokMaks) {
        const idx = cart.findIndex(c => c.id === id);
        if (idx > -1) { if (cart[idx].qty < stokMaks) cart[idx].qty++; else alert("Stok habis!"); } 
        else { cart.push({ id, nama_barang: nama, harga, qty: 1, discountItem: 0 }); }
        calculateTotal();
    }

    function calculateTotal() {
        let totalSub = 0; let totalDiscItem = 0;
        const discGlobalPerc = parseFloat(document.getElementById('m-discGlobal').value || 0);

        // Update Badge Count
        document.getElementById('cart-badge-count').innerText = cart.length;

        document.getElementById('modalCartList').innerHTML = cart.map((item, i) => {
            const subItem = item.qty * item.harga;
            const potItem = (subItem * item.discountItem) / 100;
            totalSub += subItem; totalDiscItem += potItem;
            return `
            <div class="cart-item-row">
                <div>
                    <div style="font-weight:bold; font-size:14px;">${item.nama_barang}</div>
                    <div style="font-size:12px; color:#888;">${item.qty} x ${item.harga.toLocaleString()}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:bold;">Rp ${subItem.toLocaleString()}</div>
                    <span onclick="cart.splice(${i},1);calculateTotal();" style="color:var(--danger); cursor:pointer; font-size:10px; font-weight:bold;">HAPUS</span>
                </div>
            </div>`;
        }).join('');

        if (cart.length === 0) document.getElementById('modalCartList').innerHTML = `<div style="text-align:center; padding:40px; color:#ccc;">Keranjang Kosong</div>`;

        state.sub = totalSub; state.discItem = totalDiscItem;
        const dpp1 = state.sub - state.discItem;
        state.discGlobal = (dpp1 * discGlobalPerc) / 100;
        state.total = Math.round(dpp1 - state.discGlobal);

        document.getElementById('m-txt-sub').innerText = "Rp " + state.sub.toLocaleString();
        document.getElementById('m-txt-total').innerText = "Rp " + state.total.toLocaleString();
    }

    function openPayment() {
        if(cart.length === 0) return;
        document.getElementById('cartModal').style.display = 'none';
        document.getElementById('label-total-modal').innerText = "Total Bill: Rp " + state.total.toLocaleString();
        document.getElementById('splitContainer').innerHTML = "";
        addSplitRow();
        document.getElementById('payModal').style.display = 'flex';
    }

    function closePayment() { document.getElementById('payModal').style.display = 'none'; }

    function addSplitRow() {
        const div = document.createElement('div');
        div.className = 'split-item';
        const options = paymentMethods.map(m => `<option value="${m.nama_metode}" data-akun="${m.kode_akun}">${m.nama_metode}</option>`).join('');
        div.innerHTML = `<select class="pay-method">${options}</select><input type="number" class="pay-amount" placeholder="0" oninput="updateSplitSummary()"><span style="color:red; cursor:pointer; font-weight:bold; padding: 0 10px;" onclick="this.parentElement.remove(); updateSplitSummary();">&times;</span>`;
        document.getElementById('splitContainer').appendChild(div);
        const inputs = document.querySelectorAll('.pay-amount');
        if(inputs.length === 1) { inputs[0].value = state.total; updateSplitSummary(); }
    }

    function updateSplitSummary() {
        const amounts = document.querySelectorAll('.pay-amount');
        let totalInput = 0; amounts.forEach(input => totalInput += parseFloat(input.value || 0));
        const remaining = state.total - totalInput; const change = totalInput - state.total;
        document.getElementById('txt-inputed').innerText = "Rp " + totalInput.toLocaleString();
        if (remaining > 0) {
            document.getElementById('row-rem').style.display = 'flex'; document.getElementById('row-change').style.display = 'none';
            document.getElementById('txt-remaining').innerText = "Rp " + remaining.toLocaleString();
            document.getElementById('btnConfirm').disabled = true;
        } else {
            document.getElementById('row-rem').style.display = 'none'; document.getElementById('row-change').style.display = 'flex';
            document.getElementById('txt-change').innerText = "Rp " + Math.abs(change).toLocaleString();
            document.getElementById('btnConfirm').disabled = false;
        }
    }

    async function executeTransaction() {
        if (isSaving) return; isSaving = true;
        const inv = `INV-${Date.now().toString().slice(-6)}`; const tgl = new Date().toISOString();
        const rows = document.querySelectorAll('.split-item');
        state.payments = []; let totalDibayar = 0;
        rows.forEach(row => {
            const mtd = row.querySelector('.pay-method').value;
            const amt = parseFloat(row.querySelector('.pay-amount').value || 0);
            const akun = row.querySelector('.pay-method').selectedOptions[0].dataset.akun;
            if(amt > 0) { state.payments.push({ metode: mtd, jumlah: amt, akun: akun }); totalDibayar += amt; }
        });

        try {
            const { data: trx } = await db.from('penjualan').insert([{ no_invoice: inv, subtotal: Math.round(state.sub), diskon: Math.round(state.discItem + state.discGlobal), grand_total: state.total, bayar: totalDibayar, kasir_id: currentLogId, metode_pembayaran: state.payments.length > 1 ? "SPLIT" : state.payments[0].metode, tanggal: tgl }]).select().single();
            for (const item of cart) {
                const subItem = (item.qty * item.harga) - ((item.qty * item.harga * item.discountItem) / 100);
                await db.from('penjualan_detail').insert([{ penjualan_id: trx.id, produk_id: item.id, nama_barang: item.nama_barang, qty: item.qty, harga_satuan: item.harga, subtotal_item: subItem }]);
                const { data: p } = await db.from('produk').select('*').eq('id', item.id).single();
                if (p) {
                    await db.from('produk').update({ stok_sekarang: p.stok_sekarang - item.qty }).eq('id', item.id);
                    await db.from('jurnal_umum').insert([
                        { tanggal: tgl, no_bukti: inv, kode_akun: p.akun_pendapatan, keterangan: `Jual ${item.nama_barang}`, debit: 0, kredit: subItem },
                        { tanggal: tgl, no_bukti: inv, kode_akun: p.akun_hpp, keterangan: `HPP ${item.nama_barang}`, debit: p.harga_beli * item.qty, kredit: 0 },
                        { tanggal: tgl, no_bukti: inv, kode_akun: p.akun_persediaan, keterangan: `Stok Keluar ${item.nama_barang}`, debit: 0, kredit: p.harga_beli * item.qty }
                    ]);
                }
            }
            for (const p of state.payments) { let nom = (state.payments.length === 1 && p.jumlah > state.total) ? state.total : p.jumlah; await db.from('jurnal_umum').insert([{ tanggal: tgl, no_bukti: inv, kode_akun: p.akun, keterangan: `Terima ${p.metode}`, debit: nom, kredit: 0 }]); }
            
            renderReceipt(inv, totalDibayar);
            document.getElementById('payModal').style.display = 'none';
            setTimeout(() => { window.print(); document.getElementById('waModal').style.display = 'flex'; }, 500);
        } catch (e) { alert(e.message); isSaving = false; }
    }

    function renderReceipt(inv, totalBayar) {
        const storeName = sessionStorage.getItem('NAMA_TOKO') || "BeautyBloom";
        const itemRows = cart.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i.nama_barang.substring(0,18)} x${i.qty}</span><span>${(i.qty * i.harga).toLocaleString()}</span></div>`).join('');
        document.getElementById('print-area').innerHTML = `<div style="text-align:center;"><b style="font-size:12px;">${storeName}</b><br><small>Nota Penjualan</small><br>----------------------------</div><div style="font-size:10px;">Inv: ${inv}<br>Tgl: ${new Date().toLocaleString('id-ID')}</div>----------------------------<br>${itemRows}----------------------------<br><div style="font-size:10px;"><div style="display:flex; justify-content:space-between;"><span>TOTAL:</span><span style="font-weight:bold;">Rp ${state.total.toLocaleString()}</span></div><div style="display:flex; justify-content:space-between; border-top:1px dashed #000; margin-top:5px; padding-top:5px;"><span>Bayar:</span><span>${totalBayar.toLocaleString()}</span></div><div style="display:flex; justify-content:space-between;"><span>Kembali:</span><span>${(totalBayar - state.total).toLocaleString()}</span></div></div><div style="text-align:center; font-size:10px; margin-top:10px;">*** TERIMA KASIH ***</div>`;
    }

    function sendWhatsApp() {
        const hp = document.getElementById('waNumber').value;
        const msg = `*NOTA ${sessionStorage.getItem('NAMA_TOKO') || 'BEAUTYBLOOM'}*%0ANo Invoice: ${state.lastInv}%0ATotal: Rp ${state.total.toLocaleString()}%0A%0A_Terima kasih!_`;
        window.open(`https://wa.me/${hp.startsWith('0')?'62'+hp.slice(1):hp}?text=${msg}`, '_blank');
        location.reload();
    }
    function logout() { localStorage.clear(); window.location.replace('login.html'); }
</script>
</body>
</html>
