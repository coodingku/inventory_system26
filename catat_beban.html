<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finex Pos | Buat Biaya & Pelunasan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="supabase-init.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }
        
        nav { width: 250px; background: var(--primary); color: white; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        nav h2 { color: var(--accent); text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 20px; }
        nav a { color: #bdc3c7; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: block; font-size: 14px; transition: 0.3s; }
        nav a:hover, nav a.active { background: var(--accent); color: white; }
        
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .form-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 900px; margin: auto; }
        
        .form-header { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f1f1f1; }
        
        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 5px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; }

        /* PREVIEW TABLE STYLE */
        .preview-card { margin-top: 30px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .table-preview { width: 100%; border-collapse: collapse; }
        .table-preview th { text-align: left; background: #f8f9fa; padding: 12px; font-size: 11px; color: #666; text-transform: uppercase; }
        .table-preview td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .total-section { margin-top: 20px; display: flex; justify-content: flex-end; }
        .total-box { background: var(--primary); color: white; padding: 20px; border-radius: 8px; width: 300px; text-align: right; }
        .total-box h3 { margin: 5px 0 0 0; font-size: 24px; color: var(--accent); }

        .btn-save { padding: 15px 40px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; float: right; margin-top: 20px; width: 100%; transition: 0.3s; }
        .btn-save:hover { background: #219150; }

        /* PRINT NOTA STYLE */
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden !important; }
            #print-area, #print-area * { visibility: visible !important; display: block !important; }
            #print-area { position: absolute; left: 0; top: 0; width: 58mm; padding: 5px; font-family: monospace; font-size: 12px; line-height: 1.2; }
            .dashed { border-bottom: 1px dashed #000; margin: 5px 0; }
        }
    </style>
</head>
<body>

<nav class="no-print">
    <h2>Finex Pos</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="kas_bank.html">⚖️ Kas & Bank</a>
    <a href="supplier.html">👥 Supplier</a>
    <a href="pengeluaran.html" class="active">💸 Catat Biaya</a>
    <div style="margin-top:auto; padding:15px; background:rgba(0,0,0,0.1); border-radius:8px;">
        <small>User:</small> <b id="display-user-nav">...</b>
    </div>
    <a href="#" onclick="logout()" style="color:#ff7675;">🚪 Keluar</a>
</nav>

<main>
    <div id="print-area"></div> <div class="form-container">
        <h2 style="margin-top:0; color:var(--primary);">Buat Biaya / Pelunasan</h2>
        
        <div class="form-header">
            <div>
                <div class="input-group">
                    <label>Bayar Dari (Sumber Dana)</label>
                    <select id="exp-sumber-dana">
                        <option value="">-- Pilih Kas/Bank --</option>
                        <option value="HUTANG" style="font-weight:bold; color:red;">HUTANG (Bayar Nanti)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Nama Supplier (Kontak Pemasok)</label>
                    <select id="exp-supplier-id">
                        <option value="">-- Pilih Supplier --</option>
                    </select>
                </div>
            </div>
            
            <div>
                <div class="input-group">
                    <label>Tanggal Transaksi</label>
                    <input type="date" id="exp-tanggal">
                </div>
                <div class="input-group">
                    <label>No. Transaksi</label>
                    <input type="text" id="no-bukti-auto" disabled>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>Akun Biaya</label>
                <select id="exp-kategori" onchange="updatePreview()">
                    <option value="">-- Pilih Akun Biaya --</option>
                </select>
            </div>
            <div class="input-group">
                <label>Keterangan / Memo</label>
                <input type="text" id="exp-ket" oninput="updatePreview()" placeholder="Misal: Biaya Operasional">
            </div>
            <div class="input-group">
                <label>Jumlah (Rp)</label>
                <input type="number" id="exp-jumlah" oninput="updatePreview()" placeholder="0">
            </div>
        </div>

        <div class="preview-card">
            <table class="table-preview">
                <thead>
                    <tr>
                        <th>Deskripsi Item</th>
                        <th style="text-align: right;">Subtotal</th>
                    </tr>
                </thead>
                <tbody id="preview-list">
                    <tr><td colspan="2" style="text-align: center; color: #999;">Isi data di atas untuk melihat rincian</td></tr>
                </tbody>
            </table>
        </div>

        <div class="total-section">
            <div class="total-box">
                <label style="color: #bdc3c7;">TOTAL BAYAR</label>
                <h3 id="display-total-final">Rp 0</h3>
            </div>
        </div>

        <button id="btn-submit" class="btn-save" onclick="simpanDanCetak()">
            <i class="fas fa-print"></i> SIMPAN & CETAK NOTA
        </button>
    </div>
</main>

<script>
    const session = JSON.parse(localStorage.getItem('finex_session'));

    window.onload = async () => {
        document.getElementById('exp-tanggal').value = new Date().toISOString().split('T')[0];
        document.getElementById('display-user-nav').innerText = session?.username || "Admin";
        document.getElementById('no-bukti-auto').value = 'EXP-' + Date.now().toString().slice(-6);
        await fetchDataDropdown();
    };

    async function fetchDataDropdown() {
        try {
            const { data: dana } = await db.from('akun').select('kode_akun, nama_akun').ilike('kode_akun', '11%');
            const selDana = document.getElementById('exp-sumber-dana');
            dana.forEach(d => selDana.innerHTML += `<option value="${d.kode_akun}">${d.nama_akun}</option>`);

            const { data: biaya } = await db.from('akun').select('kode_akun, nama_akun')
                .or('kode_akun.ilike.5%,kode_akun.ilike.6%,kode_akun.ilike.8%,kode_akun.ilike.2%').order('kode_akun');
            const selBiaya = document.getElementById('exp-kategori');
            biaya.forEach(b => selBiaya.innerHTML += `<option value="${b.kode_akun}">${b.kode_akun} - ${b.nama_akun}</option>`);

            const { data: sups } = await db.from('suppliers').select('*').order('nama_supplier');
            const selSup = document.getElementById('exp-supplier-id');
            sups.forEach(s => selSup.innerHTML += `<option value="${s.id}">${s.nama_supplier}</option>`);
        } catch (e) { console.error(e); }
    }

    function updatePreview() {
        const ket = document.getElementById('exp-ket').value || "Tanpa Keterangan";
        const val = parseFloat(document.getElementById('exp-jumlah').value) || 0;
        const kategori = document.getElementById('exp-kategori').options[document.getElementById('exp-kategori').selectedIndex].text;
        
        if (val > 0) {
            document.getElementById('preview-list').innerHTML = `
                <tr>
                    <td><b>[${kategori}]</b><br>${ket}</td>
                    <td style="text-align: right; font-weight: bold;">Rp ${val.toLocaleString('id-ID')}</td>
                </tr>
            `;
        }
        document.getElementById('display-total-final').innerText = "Rp " + val.toLocaleString('id-ID');
    }

    async function simpanDanCetak() {
        const tgl = document.getElementById('exp-tanggal').value;
        const kodeAkunBiaya = document.getElementById('exp-kategori').value;
        const kodeSumberDana = document.getElementById('exp-sumber-dana').value;
        const supplierId = document.getElementById('exp-supplier-id').value;
        const jumlah = parseFloat(document.getElementById('exp-jumlah').value);
        const ket = document.getElementById('exp-ket').value;
        const noBukti = document.getElementById('no-bukti-auto').value;

        if(!kodeAkunBiaya || !kodeSumberDana || !supplierId || !jumlah) return alert("Lengkapi data!");

        try {
            let akunKredit = kodeSumberDana === "HUTANG" ? "2101" : kodeSumberDana;
            
            // 1. Simpan Jurnal
            const { error: errJurnal } = await db.from('jurnal_umum').insert([
                { tanggal: tgl, no_bukti: noBukti, kode_akun: kodeAkunBiaya, keterangan: ket, debit: jumlah, kredit: 0, supplier_id: supplierId },
                { tanggal: tgl, no_bukti: noBukti, kode_akun: akunKredit, keterangan: ket, debit: 0, kredit: jumlah, supplier_id: supplierId }
            ]);
            if (errJurnal) throw errJurnal;

            // 2. Update Saldo Supplier
            const { data: sup } = await db.from('suppliers').select('saldo_hutang').eq('id', supplierId).single();
            const adjustment = (kodeSumberDana === "HUTANG") ? jumlah : -jumlah;
            await db.from('suppliers').update({ saldo_hutang: (parseFloat(sup.saldo_hutang) || 0) + adjustment }).eq('id', supplierId);

            // 3. Render Nota & Print
            renderNota(noBukti, tgl, ket, jumlah);
            
            alert("✅ Transaksi Berhasil Disimpan!");
            setTimeout(() => { window.print(); location.reload(); }, 500);

        } catch (e) { alert("Error: " + e.message); }
    }

    function renderNota(no, tgl, ket, total) {
        const storeName = sessionStorage.getItem('NAMA_TOKO') || "FINEX POS";
        const supplier = document.getElementById('exp-supplier-id').options[document.getElementById('exp-supplier-id').selectedIndex].text;
        const kategori = document.getElementById('exp-kategori').options[document.getElementById('exp-kategori').selectedIndex].text;

        document.getElementById('print-area').innerHTML = `
            <div style="text-align:center;">
                <b style="font-size:16px;">${storeName}</b><br>
                PENGELUARAN BIAYA
            </div>
            <div class="dashed"></div>
            <div>
                No: ${no}<br>
                Tgl: ${tgl}<br>
                Supp: ${supplier}
            </div>
            <div class="dashed"></div>
            <div>
                <b>${kategori}</b><br>
                ${ket}
            </div>
            <div class="dashed"></div>
            <div style="text-align:right;">
                TOTAL:<br>
                <b style="font-size:16px;">Rp ${total.toLocaleString('id-ID')}</b>
            </div>
            <div style="text-align:center; margin-top:15px; font-size:10px;">
                *** TRANSAKSI VALID ***
            </div>
        `;
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
