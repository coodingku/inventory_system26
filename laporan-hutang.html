<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finex Pos | Laporan Hutang Supplier</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="supabase-init.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: var(--bg); min-height: 100vh; }
        
        nav { width: 250px; background: var(--primary); color: white; padding: 20px; position: fixed; height: 100vh; box-sizing: border-box; }
        nav h2 { color: var(--accent); text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        nav a { color: #bdc3c7; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 5px; }
        nav a.active { background: var(--accent); color: white; }

        main { flex: 1; margin-left: 250px; padding: 40px; }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* TABEL STYLE */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid #eee; font-size: 11px; text-transform: uppercase; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .total-row { background: #f1f2f6; font-weight: bold; }
        .btn-export { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; margin-left: 5px; }
        
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .tag-danger { background: #ffebee; color: #c62828; }
        .tag-success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<nav>
    <h2>Finex Pos</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="supplier.html">👥 Supplier</a>
    <a href="laporan-hutang.html" class="active">📑 Laporan Hutang</a>
</nav>

<main>
    <div class="header-flex">
        <div>
            <h1>Laporan Hutang Supplier</h1>
            <p style="color: #666;">Ringkasan seluruh kewajiban pembayaran kepada pemasok.</p>
        </div>
        <div>
            <button class="btn-export" style="background: #27ae60;" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Excel</button>
            <button class="btn-export" style="background: #e74c3c;" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        </div>
    </div>

    <div class="card">
        <table id="table-hutang">
            <thead>
                <tr>
                    <th>Nama Supplier</th>
                    <th>Kontak Person</th>
                    <th>No. Telepon</th>
                    <th style="text-align: right;">Total Hutang</th>
                    <th style="text-align: center;">Status</th>
                </tr>
            </thead>
            <tbody id="hutang-list">
                <tr><td colspan="5" style="text-align: center;">Memuat data...</td></tr>
            </tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="3" style="text-align: right;">TOTAL KESELURUHAN HUTANG:</td>
                    <td id="grand-total" style="text-align: right; color: var(--danger);">Rp 0</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>
</main>

<script>
    window.onload = loadLaporanHutang;

    async function loadLaporanHutang() {
        try {
            // Ambil data supplier yang memiliki saldo_hutang > 0
            const { data, error } = await db
                .from('suppliers')
                .select('*')
                .order('nama_supplier');

            if (error) throw error;

            const tbody = document.getElementById('hutang-list');
            tbody.innerHTML = '';
            let totalSemua = 0;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Tidak ada data supplier.</td></tr>';
                return;
            }

            data.forEach(s => {
                const hutang = parseFloat(s.saldo_hutang || 0);
                totalSemua += hutang;

                tbody.innerHTML += `
                    <tr>
                        <td><b>${s.nama_supplier}</b></td>
                        <td>${s.kontak_person || '-'}</td>
                        <td>${s.no_telp || '-'}</td>
                        <td style="text-align: right; font-weight: bold;">
                            Rp ${hutang.toLocaleString('id-ID')}
                        </td>
                        <td style="text-align: center;">
                            <span class="status-tag ${hutang > 0 ? 'tag-danger' : 'tag-success'}">
                                ${hutang > 0 ? 'BELUM LUNAS' : 'LUNAS'}
                            </span>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('grand-total').innerText = "Rp " + totalSemua.toLocaleString('id-ID');

        } catch (e) {
            console.error(e);
            alert("Gagal memuat laporan.");
        }
    }

    function exportExcel() {
        const ws = XLSX.utils.table_to_sheet(document.getElementById("table-hutang"));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "LaporanHutang");
        XLSX.writeFile(wb, `Laporan_Hutang_${Date.now()}.xlsx`);
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Laporan Hutang Supplier - Finex POS", 14, 15);
        doc.autoTable({ 
            html: '#table-hutang',
            startY: 20,
            theme: 'grid',
            headStyles: { fillColor: [44, 62, 80] }
        });
        doc.save(`Laporan_Hutang_${Date.now()}.pdf`);
    }
</script>
</body>
</html>
