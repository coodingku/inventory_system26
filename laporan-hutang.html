<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finex Pos | Rincian Hutang Supplier</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="supabase-init.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: var(--bg); min-height: 100vh; }
        
        nav { width: 250px; background: var(--primary); color: white; padding: 20px; position: fixed; height: 100vh; box-sizing: border-box; }
        nav h2 { color: var(--accent); text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        nav a { color: #bdc3c7; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 5px; font-size: 14px; }
        nav a.active { background: var(--accent); color: white; }

        main { flex: 1; margin-left: 250px; padding: 40px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid #eee; font-size: 11px; text-transform: uppercase; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .clickable-name { color: var(--accent); cursor: pointer; text-decoration: underline; }
        .total-row { background: #f1f2f6; font-weight: bold; }
        .btn-export { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; margin-left: 5px; }

        /* MODAL STYLE */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 15px; width: 70%; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #999; }
    </style>
</head>
<body>

<nav>
    <h2>Finex Pos</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="supplier.html">👥 Supplier</a>
    <a href="laporan-hutang.html" class="active">📑 Laporan Hutang</a>
</nav>

<main>
    <div class="header-flex">
        <div>
            <h1>Laporan Hutang Supplier</h1>
            <p style="color: #666;">Klik nama supplier untuk melihat rincian faktur/biaya.</p>
        </div>
        <div>
            <button class="btn-export" style="background: #27ae60;" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Excel</button>
            <button class="btn-export" style="background: #e74c3c;" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        </div>
    </div>

    <div class="card">
        <table id="table-hutang">
            <thead>
                <tr>
                    <th>Nama Supplier</th>
                    <th>Kontak Person</th>
                    <th style="text-align: right;">Total Hutang</th>
                    <th style="text-align: center;">Status</th>
                </tr>
            </thead>
            <tbody id="hutang-list">
                <tr><td colspan="4" style="text-align: center;">Memuat data...</td></tr>
            </tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="2" style="text-align: right;">TOTAL KESELURUHAN:</td>
                    <td id="grand-total" style="text-align: right; color: var(--danger);">Rp 0</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>
</main>

<div id="modalRincian" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-title">Rincian Hutang</h2>
        <hr>
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>No. Bukti</th>
                    <th>Keterangan</th>
                    <th style="text-align: right;">Hutang (+)</th>
                    <th style="text-align: right;">Bayar (-)</th>
                </tr>
            </thead>
            <tbody id="rincian-list"></tbody>
        </table>
    </div>
</div>

<script>
    window.onload = loadLaporanHutang;

    async function loadLaporanHutang() {
        try {
            const { data, error } = await db.from('suppliers').select('*').order('nama_supplier');
            if (error) throw error;

            const tbody = document.getElementById('hutang-list');
            tbody.innerHTML = '';
            let totalSemua = 0;

            data.forEach(s => {
                const hutang = parseFloat(s.saldo_hutang || 0);
                totalSemua += hutang;

                tbody.innerHTML += `
                    <tr>
                        <td class="clickable-name" onclick="lihatDetail('${s.id}', '${s.nama_supplier}')">
                            <b>${s.nama_supplier}</b>
                        </td>
                        <td>${s.kontak_person || '-'}</td>
                        <td style="text-align: right; font-weight: bold;">
                            Rp ${hutang.toLocaleString('id-ID')}
                        </td>
                        <td style="text-align: center;">
                            <span style="padding:4px 8px; border-radius:4px; font-size:10px; font-weight:bold; background:${hutang > 0 ? '#ffebee' : '#e8f5e9'}; color:${hutang > 0 ? '#c62828' : '#2e7d32'};">
                                ${hutang > 0 ? 'BELUM LUNAS' : 'LUNAS'}
                            </span>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('grand-total').innerText = "Rp " + totalSemua.toLocaleString('id-ID');
        } catch (e) { console.error(e); }
    }

    async function lihatDetail(supplierId, nama) {
        document.getElementById('modal-title').innerText = "Rincian Transaksi: " + nama;
        document.getElementById('modalRincian').style.display = 'block';
        
        const tbody = document.getElementById('rincian-list');
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Mencari data...</td></tr>';

        try {
            // Ambil transaksi dari jurnal_umum yang terkait dengan supplier ini
            // Logika: Jika Akun Hutang (2101) di Kredit = Hutang bertambah. Di Debit = Pembayaran/Pelunasan.
            const { data, error } = await db.from('jurnal_umum')
                .select('*')
                .eq('supplier_id', supplierId)
                .order('tanggal', { ascending: true });

            if (error) throw error;

            tbody.innerHTML = '';
            data.forEach(j => {
                // Tampilkan baris jika akunnya adalah akun Hutang atau akun Biaya terkait
                // Sederhananya kita filter data jurnal yang memiliki supplier_id ini
                const htg = j.kredit > 0 ? j.kredit : 0; // Hutang bertambah di Kredit
                const byr = j.debit > 0 ? j.debit : 0;  // Hutang berkurang di Debit (saat pelunasan)
                
                // Hanya tampilkan baris yang relevan dengan saldo hutang
                if(htg > 0 || byr > 0) {
                    tbody.innerHTML += `
                        <tr>
                            <td>${new Date(j.tanggal).toLocaleDateString('id-ID')}</td>
                            <td><code>${j.no_bukti}</code></td>
                            <td>${j.keterangan}</td>
                            <td style="text-align: right; color: var(--danger);">Rp ${htg.toLocaleString('id-ID')}</td>
                            <td style="text-align: right; color: var(--success);">Rp ${byr.toLocaleString('id-ID')}</td>
                        </tr>
                    `;
                }
            });

            if(data.length === 0) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Tidak ada riwayat transaksi.</td></tr>';

        } catch (e) { alert(e.message); }
    }

    function closeModal() { document.getElementById('modalRincian').style.display = 'none'; }
    window.onclick = (event) => { if (event.target == document.getElementById('modalRincian')) closeModal(); }

    function exportExcel() { /* Sama seperti kode sebelumnya */ }
    function exportPDF() { /* Sama seperti kode sebelumnya */ }
</script>
</body>
</html>
